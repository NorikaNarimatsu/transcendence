<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Pong</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div id="hud">
      <div id="leftName">LEFT</div>
      <div id="score">0 : 0</div>
      <div id="rightName">RIGHT</div>
    </div>

    <div id="wrap">
      <canvas id="game" width="900" height="540"></canvas>
    </div>

    <div id="controls">W/S (Left) • ↑/↓ (Right) • Space=Start • P=Pause • R=Reset</div>

    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
